<div class="animate-slide-in">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Ajanda ve Planlar</h2>
            <p class="text-slate-500 italic mt-1">n8n tarafından parçalanmış görevlerini burada yönetebilirsin.</p>
        </div>
    </div>

    <div class="flex flex-col xl:flex-row gap-10">

        <!-- Takvim -->
        <div class="flex-1 min-w-[350px] glass-card p-8 bg-white/90 shadow-2xl">
            <div id="calendar" class="min-h-[600px]"></div>
        </div>

        <!-- Görev Formu -->
        <div id="task-form-panel" class="w-full xl:w-[480px] glass-card p-10 bg-white shadow-2xl border-l-4 border-indigo-500 hidden animate-slide-in">
            <div class="flex justify-between items-start mb-8">
                <h3 class="text-2xl font-bold text-slate-800">Görev Detayları</h3>
                <button onclick="closeForm()" class="text-slate-400 hover:text-red-500 transition-colors" aria-label="Kapat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Görev Başlığı</label>
                    <input type="text" id="task-title" placeholder="Neye odaklanıyoruz?"
                        class="text-2xl font-semibold w-full outline-none border-b-2 border-slate-100 focus:border-indigo-500 pb-4 transition-all bg-transparent">
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Planlanan Tarih</label>
                        <input type="date" id="task-date"
                            class="w-full bg-slate-50 p-4 rounded-2xl border border-transparent focus:border-indigo-200 outline-none font-medium">
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Başlangıç</label>
                            <input type="time" id="task-start" onchange="updateEndTime()"
                                class="w-full bg-slate-50 p-4 rounded-2xl border border-transparent focus:border-indigo-200 outline-none font-bold text-indigo-600">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Tahmini Bitiş</label>
                            <input type="time" id="task-end"
                                class="w-full bg-slate-50 p-4 rounded-2xl border border-transparent focus:border-indigo-200 outline-none font-bold text-slate-400">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Ek Detaylar</label>
                        <textarea id="task-desc" placeholder="Notlarını veya n8n için ipuçlarını buraya yazabilirsin..."
                            class="w-full bg-slate-50 p-5 rounded-3xl h-32 border border-transparent focus:border-indigo-200 outline-none resize-none text-sm leading-relaxed"></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="saveTaskToGoogle()"
                        class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                        Takvime İşle
                    </button>
                    <button onclick="triggerN8N_Split()"
                        class="flex-1 bg-emerald-50 text-emerald-600 px-6 rounded-2xl font-bold border border-emerald-100 hover:bg-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span>🧩</span> Parçala
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
